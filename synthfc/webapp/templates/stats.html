<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>synthfc — FC Dataset Statistics</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
        }
        
        .stats-header h1 {
            margin: 0;
        }
        
        .dataset-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .dataset-selector select {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
            min-width: 250px;
        }
        
        .compare-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .summary-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .summary-card .value.error {
            color: #f44336;
        }
        
        .summary-card .value.warning {
            color: #ff9800;
        }
        
        .summary-card .label {
            color: #888;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
        }
        
        .chart-container h3 {
            margin: 0 0 15px 0;
            color: #fff;
            font-size: 1.1em;
        }
        
        .chart-wrapper {
            position: relative;
            height: 250px;
        }
        
        .param-table {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
        }
        
        .param-table h3 {
            margin: 0 0 15px 0;
        }
        
        .param-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .param-table th, .param-table td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        
        .param-table th {
            background: #333;
            color: #888;
            font-weight: 500;
        }
        
        .param-table tr:hover {
            background: #333;
        }
        
        .progress-bar {
            height: 8px;
            background: #444;
            border-radius: 4px;
            overflow: hidden;
            min-width: 150px;
        }
        
        .progress-bar .fill {
            height: 100%;
            border-radius: 4px;
        }
        
        .progress-bar .fill.pass { background: #4CAF50; }
        .progress-bar .fill.fail { background: #f44336; }
        .progress-bar .fill.warn { background: #ff9800; }
        
        .nav-link {
            color: #4CAF50;
            text-decoration: none;
        }
        
        .nav-link:hover {
            text-decoration: underline;
        }
        
        .compare-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #333;
        }
        
        .compare-section h2 {
            margin-bottom: 20px;
        }
        
        .compare-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .compare-card {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
        }
        
        .compare-card h4 {
            margin: 0 0 15px 0;
            color: #888;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        /* Distribution tables */
        .distribution-section {
            margin-top: 30px;
        }
        
        .distribution-section h2 {
            margin-bottom: 20px;
            color: #fff;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        
        .distribution-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .distribution-table {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
        }
        
        .distribution-table h3 {
            margin: 0 0 15px 0;
            color: #fff;
            font-size: 1em;
        }
        
        .distribution-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        
        .distribution-table th, .distribution-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        
        .distribution-table th {
            background: #333;
            color: #888;
            font-weight: 500;
        }
        
        .distribution-table tr:hover {
            background: #333;
        }
        
        .delta-positive { color: #4CAF50; }
        .delta-negative { color: #f44336; }
        .delta-neutral { color: #888; }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .compare-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="stats-container">
        <div class="stats-header">
            <div>
                <h1>📊 Dataset Statistics</h1>
                <a href="/" class="nav-link">← Back to Viewer</a>
            </div>
            <div class="dataset-selector">
                <select id="datasetSelect" onchange="loadDatasetStats()">
                    <option value="">-- Select Dataset --</option>
                </select>
                <div class="compare-toggle">
                    <input type="checkbox" id="compareMode" onchange="toggleCompareMode()">
                    <label for="compareMode">Compara</label>
                </div>
                <select id="datasetCompare" class="hidden" onchange="loadCompareStats()">
                    <option value="">-- Compare with --</option>
                </select>
            </div>
        </div>
        
        <div id="statsContent">
            <div class="loading">
                <p>👆 Seleziona un dataset dal menu</p>
            </div>
        </div>
        
        <div id="compareContent" class="compare-section hidden">
        </div>
    </div>

    <script>
        let currentStats = null;
        let compareStats = null;
        let expectedConfig = null;
        let globalConfig = null;  // Config globale (fallback)
        let charts = {};
        
        // Colors
        const COLORS = {
            pass: '#4CAF50',
            fail: '#f44336',
            warn: '#ff9800',
            primary: '#2196F3',
            secondary: '#9C27B0',
            accent: '#00BCD4',
            palette: ['#4CAF50', '#2196F3', '#ff9800', '#9C27B0', '#00BCD4', '#E91E63', '#3F51B5', '#009688']
        };
        
        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            // Load global config as fallback
            const configRes = await fetch('/api/sampling_config');
            globalConfig = await configRes.json();
            console.log('Global config:', globalConfig);
            
            loadDatasets();
        });
        
        async function loadDatasets() {
            const res = await fetch('/api/files');
            const data = await res.json();
            
            const select1 = document.getElementById('datasetSelect');
            const select2 = document.getElementById('datasetCompare');
            
            select1.innerHTML = '<option value="">-- Select Dataset --</option>';
            select2.innerHTML = '<option value="">-- Compare with --</option>';
            
            for (const f of data.files) {
                if (f.batch_name) {
                    const opt1 = document.createElement('option');
                    opt1.value = f.batch_name;
                    opt1.textContent = `${f.batch_name} (${f.count || '?'} esempi)`;
                    select1.appendChild(opt1);
                    
                    const opt2 = opt1.cloneNode(true);
                    select2.appendChild(opt2);
                }
            }
        }
        
        async function loadDatasetStats() {
            const batch = document.getElementById('datasetSelect').value;
            if (!batch) {
                document.getElementById('statsContent').innerHTML = '<div class="loading"><p>👆 Seleziona un dataset dal menu</p></div>';
                return;
            }
            
            document.getElementById('statsContent').innerHTML = '<div class="loading"><p>⏳ Caricamento...</p></div>';
            
            // Carica le stats del dataset
            const res = await fetch(`/api/dataset_stats/${batch}`);
            currentStats = await res.json();
            
            if (currentStats.error) {
                document.getElementById('statsContent').innerHTML = `<div class="loading"><p>❌ ${currentStats.error}</p></div>`;
                return;
            }
            
            // Carica la config specifica del batch (se disponibile)
            const configRes = await fetch(`/api/batch_config/${batch}`);
            expectedConfig = await configRes.json();
            
            // Se fallback al globale, usa quello
            if (!expectedConfig || expectedConfig.error) {
                expectedConfig = globalConfig;
            }
            console.log('Using config for', batch, ':', expectedConfig.source || 'global');
            
            renderStats(currentStats);
        }
        
        function renderStats(stats) {
            const s = stats.summary;
            
            let html = `
                <div class="summary-cards">
                    <div class="summary-card">
                        <div class="value">${s.total}</div>
                        <div class="label">Totale Esempi</div>
                    </div>
                    <div class="summary-card">
                        <div class="value">${s.valid}</div>
                        <div class="label">Validi</div>
                    </div>
                    <div class="summary-card">
                        <div class="value error">${s.errors}</div>
                        <div class="label">Errori API</div>
                    </div>
                    <div class="summary-card">
                        <div class="value">${s.pass}</div>
                        <div class="label">✅ Pass</div>
                    </div>
                    <div class="summary-card">
                        <div class="value warning">${s.fail}</div>
                        <div class="label">❌ Fail</div>
                    </div>
                    <div class="summary-card">
                        <div class="value">${s.pass_rate}%</div>
                        <div class="label">Pass Rate</div>
                    </div>
                </div>
                
                <div class="charts-grid">
                    <div class="chart-container">
                        <h3>📊 Distribuzione Call Type</h3>
                        <div class="chart-wrapper">
                            <canvas id="callTypeChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h3>🔧 Numero Tool Calls</h3>
                        <div class="chart-wrapper">
                            <canvas id="toolCallsChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h3>💬 Lunghezza Conversazione</h3>
                        <div class="chart-wrapper">
                            <canvas id="convLengthChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h3>🌍 Distribuzione Lingua</h3>
                        <div class="chart-wrapper">
                            <canvas id="langChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <div class="param-table">
                    <h3>📋 Validazione per Parametro</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Parametro</th>
                                <th>✅ Pass</th>
                                <th>❌ Fail</th>
                                <th>⚠️ Warn</th>
                                <th>Pass Rate</th>
                                <th>Distribuzione</th>
                            </tr>
                        </thead>
                        <tbody id="paramTableBody"></tbody>
                    </table>
                </div>
                
                <div class="distribution-section">
                    <h2>📈 Distribuzioni vs Expected <span id="configSource" style="font-size: 0.7em; color: #888;"></span></h2>
                    <div class="distribution-grid" id="distributionGrid"></div>
                </div>
            `;
            
            document.getElementById('statsContent').innerHTML = html;
            
            // Render charts
            renderCharts(stats);
            
            // Render param table
            renderParamTable(stats.param_stats);
            
            // Render distribution tables
            renderDistributionTables(stats);
            
            // Update config source indicator
            const configSourceEl = document.getElementById('configSource');
            if (configSourceEl) {
                if (expectedConfig?.source === 'batch') {
                    configSourceEl.textContent = '(config dal batch)';
                    configSourceEl.style.color = '#4CAF50';
                } else {
                    configSourceEl.textContent = '(config globale)';
                    configSourceEl.style.color = '#ff9800';
                }
            }
        }
        
        function renderCharts(stats) {
            // Destroy existing charts
            Object.values(charts).forEach(c => c.destroy());
            charts = {};
            
            const total = stats.summary.valid;
            
            // Helper to create tooltip with expected
            function makeTooltipCallback(expectedMap, keyTransform = k => k) {
                return {
                    callbacks: {
                        label: function(context) {
                            const label = context.label || '';
                            const value = context.raw;
                            const pct = total > 0 ? (value / total * 100).toFixed(1) : 0;
                            
                            const key = keyTransform(label);
                            const expected = expectedMap ? expectedMap[key] : null;
                            
                            let lines = [`${label}: ${value} (${pct}%)`];
                            if (expected !== null && expected !== undefined) {
                                const expPct = (expected * 100).toFixed(1);
                                const diff = (parseFloat(pct) - parseFloat(expPct)).toFixed(1);
                                const diffStr = diff > 0 ? `+${diff}` : diff;
                                lines.push(`Expected: ${expPct}%`);
                                lines.push(`Delta: ${diffStr}pp`);
                            }
                            return lines;
                        }
                    }
                };
            }
            
            const baseOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#888' }
                    }
                }
            };
            
            // Call Type Chart (Doughnut) - has expected
            const ctData = stats.distributions.call_type;
            charts.callType = new Chart(document.getElementById('callTypeChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(ctData),
                    datasets: [{
                        data: Object.values(ctData),
                        backgroundColor: COLORS.palette.slice(0, Object.keys(ctData).length)
                    }]
                },
                options: {
                    ...baseOptions,
                    plugins: {
                        ...baseOptions.plugins,
                        tooltip: makeTooltipCallback(expectedConfig?.call_type)
                    }
                }
            });
            
            // Tool Calls Chart (Bar) - has expected
            const tcData = stats.distributions.num_tool_calls;
            const tcLabels = Object.keys(tcData).sort((a, b) => parseInt(a) - parseInt(b));
            charts.toolCalls = new Chart(document.getElementById('toolCallsChart'), {
                type: 'bar',
                data: {
                    labels: tcLabels,
                    datasets: [{
                        label: 'Esempi',
                        data: tcLabels.map(k => tcData[k]),
                        backgroundColor: COLORS.primary
                    }]
                },
                options: {
                    ...baseOptions,
                    plugins: {
                        ...baseOptions.plugins,
                        tooltip: makeTooltipCallback(expectedConfig?.num_tool_calls)
                    },
                    scales: {
                        y: { ticks: { color: '#888' }, grid: { color: '#333' } },
                        x: { ticks: { color: '#888' }, grid: { color: '#333' } }
                    }
                }
            });
            
            // Conv Length Chart (Bar) - no expected
            const clData = stats.distributions.conversation_length;
            const clLabels = Object.keys(clData).sort((a, b) => parseInt(a.split('-')[0]) - parseInt(b.split('-')[0]));
            charts.convLength = new Chart(document.getElementById('convLengthChart'), {
                type: 'bar',
                data: {
                    labels: clLabels,
                    datasets: [{
                        label: 'Messaggi',
                        data: clLabels.map(k => clData[k]),
                        backgroundColor: COLORS.accent
                    }]
                },
                options: {
                    ...baseOptions,
                    plugins: {
                        ...baseOptions.plugins,
                        tooltip: makeTooltipCallback(null)  // no expected for conv length
                    },
                    scales: {
                        y: { ticks: { color: '#888' }, grid: { color: '#333' } },
                        x: { ticks: { color: '#888' }, grid: { color: '#333' } }
                    }
                }
            });
            
            // Language Combo Chart (Pie) - has expected
            const langData = stats.distributions.language;
            charts.lang = new Chart(document.getElementById('langChart'), {
                type: 'pie',
                data: {
                    labels: Object.keys(langData),
                    datasets: [{
                        data: Object.values(langData),
                        backgroundColor: [COLORS.pass, COLORS.primary, COLORS.warn, COLORS.secondary]
                    }]
                },
                options: {
                    ...baseOptions,
                    plugins: {
                        ...baseOptions.plugins,
                        tooltip: makeTooltipCallback(expectedConfig?.language_combo)
                    }
                }
            });
        }
        
        function renderParamTable(paramStats) {
            const tbody = document.getElementById('paramTableBody');
            tbody.innerHTML = '';
            
            for (const [param, stats] of Object.entries(paramStats).sort()) {
                const total = stats.pass + stats.fail + stats.warn;
                const passRate = total > 0 ? Math.round(stats.pass / total * 100) : 0;
                const failRate = total > 0 ? Math.round(stats.fail / total * 100) : 0;
                const warnRate = total > 0 ? Math.round(stats.warn / total * 100) : 0;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${param}</strong></td>
                    <td>${stats.pass}</td>
                    <td>${stats.fail}</td>
                    <td>${stats.warn}</td>
                    <td>${passRate}%</td>
                    <td>
                        <div class="progress-bar">
                            <div class="fill pass" style="width: ${passRate}%; display: inline-block;"></div>
                            <div class="fill fail" style="width: ${failRate}%; display: inline-block;"></div>
                            <div class="fill warn" style="width: ${warnRate}%; display: inline-block;"></div>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }
        
        function renderDistributionTables(stats) {
            const grid = document.getElementById('distributionGrid');
            if (!grid) return;
            
            const total = stats.summary.valid;
            const subcounts = stats.subcounts || {};
            
            // Helper to create a distribution table
            function createTable(title, actualDist, expectedDist, baseTotal, sortNumeric = false) {
                let items = Object.keys({...actualDist, ...expectedDist});
                if (sortNumeric) {
                    items = items.sort((a, b) => parseInt(a) - parseInt(b));
                } else {
                    items = items.sort();
                }
                
                let rows = items.map(key => {
                    const actual = actualDist[key] || 0;
                    const actualPct = baseTotal > 0 ? (actual / baseTotal * 100).toFixed(1) : 0;
                    const expected = expectedDist ? expectedDist[key] : null;
                    const expectedPct = expected !== null && expected !== undefined ? (expected * 100).toFixed(1) : '-';
                    
                    let delta = '-';
                    let deltaClass = 'delta-neutral';
                    if (expected !== null && expected !== undefined) {
                        const d = parseFloat(actualPct) - parseFloat(expectedPct);
                        delta = (d > 0 ? '+' : '') + d.toFixed(1) + 'pp';
                        deltaClass = d > 2 ? 'delta-positive' : (d < -2 ? 'delta-negative' : 'delta-neutral');
                    }
                    
                    return `
                        <tr>
                            <td><strong>${key}</strong></td>
                            <td>${actualPct}% <span style="color:#666">(${actual})</span></td>
                            <td>${expectedPct}${expectedPct !== '-' ? '%' : ''}</td>
                            <td class="${deltaClass}">${delta}</td>
                        </tr>
                    `;
                }).join('');
                
                return `
                    <div class="distribution-table">
                        <h3>${title}</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Valore</th>
                                    <th>Actual</th>
                                    <th>Expected</th>
                                    <th>Delta</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            }
            
            let html = '';
            
            // Call Type
            html += createTable(
                '🎯 Call Type',
                stats.distributions.call_type,
                expectedConfig?.call_type,
                total
            );
            
            // Language Combo (tool_lang, conv_lang)
            html += createTable(
                '🌍 Language Combo (tool,conv)',
                stats.distributions.language,
                expectedConfig?.language_combo,
                total
            );
            
            // Num Tool Calls (solo su positive) - sorted numerically
            html += createTable(
                '🔧 Num Tool Calls (su positive)',
                stats.distributions.num_tool_calls,
                expectedConfig?.num_tool_calls,
                subcounts.positive || total,
                true  // sortNumeric
            );
            
            // Positive Type
            html += createTable(
                '✅ Positive Type (sottocategorie)',
                stats.distributions.positive_type,
                expectedConfig?.positive_type,
                subcounts.positive || 1
            );
            
            // Negative Reason
            html += createTable(
                '❌ Negative Reason (sottocategorie)',
                stats.distributions.negative_reason,
                expectedConfig?.negative_reason,
                subcounts.negative || 1
            );
            
            // Clarification Outcome
            html += createTable(
                '❓ Clarification Outcome (sottocategorie)',
                stats.distributions.clarification_outcome,
                expectedConfig?.clarification_outcome,
                subcounts.clarification || 1
            );
            
            // Out of Scope Requests
            html += createTable(
                '🚫 Out of Scope Requests (richieste fuori scope)',
                stats.distributions.out_of_scope_requests || {},
                expectedConfig?.out_of_scope_requests,
                total,
                true  // sortNumeric
            );
            
            grid.innerHTML = html;
        }
        
        function toggleCompareMode() {
            const enabled = document.getElementById('compareMode').checked;
            document.getElementById('datasetCompare').classList.toggle('hidden', !enabled);
            document.getElementById('compareContent').classList.toggle('hidden', !enabled);
            
            if (!enabled) {
                compareStats = null;
            }
        }
        
        async function loadCompareStats() {
            const batch = document.getElementById('datasetCompare').value;
            if (!batch || !currentStats) return;
            
            const res = await fetch(`/api/dataset_stats/${batch}`);
            compareStats = await res.json();
            
            if (compareStats.error) {
                document.getElementById('compareContent').innerHTML = `<div class="loading"><p>❌ ${compareStats.error}</p></div>`;
                return;
            }
            
            renderComparison();
        }
        
        function renderComparison() {
            if (!currentStats || !compareStats) return;
            
            const c1 = currentStats.summary;
            const c2 = compareStats.summary;
            
            const diff = (a, b) => {
                const d = a - b;
                if (d > 0) return `<span style="color: #4CAF50">+${d}</span>`;
                if (d < 0) return `<span style="color: #f44336">${d}</span>`;
                return '=';
            };
            
            const html = `
                <h2>📊 Confronto Dataset</h2>
                <div class="compare-grid">
                    <div class="compare-card">
                        <h4>${currentStats.batch_name}</h4>
                        <p><strong>Totale:</strong> ${c1.total}</p>
                        <p><strong>Pass:</strong> ${c1.pass} (${c1.pass_rate}%)</p>
                        <p><strong>Fail:</strong> ${c1.fail}</p>
                        <p><strong>Errori:</strong> ${c1.errors}</p>
                    </div>
                    <div class="compare-card">
                        <h4>${compareStats.batch_name}</h4>
                        <p><strong>Totale:</strong> ${c2.total} (${diff(c2.total, c1.total)})</p>
                        <p><strong>Pass:</strong> ${c2.pass} (${c2.pass_rate}%) ${diff(c2.pass_rate, c1.pass_rate)}pp</p>
                        <p><strong>Fail:</strong> ${c2.fail} (${diff(c2.fail, c1.fail)})</p>
                        <p><strong>Errori:</strong> ${c2.errors} (${diff(c2.errors, c1.errors)})</p>
                    </div>
                </div>
            `;
            
            document.getElementById('compareContent').innerHTML = html;
        }
    </script>
</body>
</html>
